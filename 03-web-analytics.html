<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Workspace - Business Intelligence</title>
    <link rel="stylesheet" href="styles-luxury.css" />
  </head>
  <body>
    <header>
      <h1>Analytics Workspace</h1>
      <button type="button">ðŸ“Š Export Report</button>
    </header>

    <main>
      <aside>
        <h2>Filters</h2>
        <form>
          <label for="range">Date Range</label>
          <select id="range">
            <option>Last 7 days</option>
            <option>Last 30 days</option>
            <option>Last 90 days</option>
          </select>

          <label for="channel">Channel</label>
          <select id="channel">
            <option>All channels</option>
            <option>Organic</option>
            <option>Paid</option>
          </select>
        </form>
      </aside>

      <section>
        <h2>Key Metrics</h2>
        <div class="articles-grid">
          <article>
            <h3>Visitors</h3>
            <p style="font-size: 1.75rem; font-weight: 600; color: var(--color-secondary);">42,100</p>
            <small>Total unique visitors</small>
          </article>
          <article>
            <h3>Conversion Rate</h3>
            <p style="font-size: 1.75rem; font-weight: 600; color: var(--color-secondary);">3.8%</p>
            <small>Visitor to customer</small>
          </article>
          <article>
            <h3>Bounce Rate</h3>
            <p style="font-size: 1.75rem; font-weight: 600; color: var(--color-secondary);">28%</p>
            <small>Single page sessions</small>
          </article>
        </div>
      </section>

      <section>
        <h2>Top Pages</h2>
        <table>
          <thead>
            <tr>
              <th>Page</th>
              <th>Views</th>
              <th>Conversion</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Homepage</td>
              <td>18,400</td>
              <td>4.2%</td>
            </tr>
            <tr>
              <td>Pricing</td>
              <td>8,120</td>
              <td>6.1%</td>
            </tr>
            <tr>
              <td>Blog</td>
              <td>5,900</td>
              <td>1.9%</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
</html>
